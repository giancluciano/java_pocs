apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: kafka
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.9.0
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: KAFKA_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['apps.kubernetes.io/pod-index']
            - name: CLUSTER_ID
              value: "MkU3OEVBTTJENTRKNTcxOQ"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "0@kafka-0.kafka-headless.kafka.svc.cluster.local:9093,1@kafka-1.kafka-headless.kafka.svc.cluster.local:9093,2@kafka-2.kafka-headless.kafka.svc.cluster.local:9093"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "2"
            - name: KAFKA_DEFAULT_REPLICATION_FACTOR
              value: "3"
            - name: KAFKA_MIN_INSYNC_REPLICAS
              value: "2"
            - name: KAFKA_LOG_DIRS
              value: "/var/lib/kafka/data"
          command:
            - bash
            - -c
            - |
              set -e
              ORDINAL=${POD_NAME##*-}
              export KAFKA_NODE_ID=$ORDINAL
              export KAFKA_ADVERTISED_LISTENERS="PLAINTEXT://${POD_NAME}.kafka-headless.kafka.svc.cluster.local:9092"

              CONFIG_FILE=/tmp/kraft-server.properties
              cat > $CONFIG_FILE <<EOF
              node.id=$KAFKA_NODE_ID
              process.roles=$KAFKA_PROCESS_ROLES
              listeners=$KAFKA_LISTENERS
              advertised.listeners=$KAFKA_ADVERTISED_LISTENERS
              controller.listener.names=$KAFKA_CONTROLLER_LISTENER_NAMES
              inter.broker.listener.name=$KAFKA_INTER_BROKER_LISTENER_NAME
              controller.quorum.voters=$KAFKA_CONTROLLER_QUORUM_VOTERS
              offsets.topic.replication.factor=$KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              transaction.state.log.replication.factor=$KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              transaction.state.log.min.isr=$KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              default.replication.factor=$KAFKA_DEFAULT_REPLICATION_FACTOR
              min.insync.replicas=$KAFKA_MIN_INSYNC_REPLICAS
              log.dirs=$KAFKA_LOG_DIRS
              EOF

              /opt/kafka/bin/kafka-storage.sh format \
                --config $CONFIG_FILE \
                --cluster-id $CLUSTER_ID \
                --ignore-formatted

              exec /opt/kafka/bin/kafka-server-start.sh $CONFIG_FILE
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 15
          volumeMounts:
            - name: kafka-data
              mountPath: /var/lib/kafka/data
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

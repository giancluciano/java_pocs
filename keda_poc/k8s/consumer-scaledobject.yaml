apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: consumer-app
spec:
  scaleTargetRef:
    name: consumer-app
  pollingInterval: 10
  cooldownPeriod: 30
  minReplicaCount: 0
  maxReplicaCount: 10
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: host.minikube.internal:9092
        consumerGroup: consumer-app-group
        topic: demo-topic
        lagThreshold: "5"
        offsetResetPolicy: earliest
